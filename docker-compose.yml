version: "3.9"

services:
  # ─── Banco de dados PostgreSQL ───────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: setupso_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: setupso
      POSTGRES_USER: setupso
      POSTGRES_PASSWORD: ${DB_PASSWORD:-senha_segura}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U setupso"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── API + Frontend (Node.js) ────────────────────────────────────────────────
  api:
    build: .
    container_name: setupso_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://setupso:${DB_PASSWORD:-senha_segura}@db:5432/setupso
      JWT_SECRET: ${JWT_SECRET:-troque_em_producao}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-admin}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-admin123}
    ports:
      - "${PORT:-3000}:3000"

volumes:
  postgres_data:
