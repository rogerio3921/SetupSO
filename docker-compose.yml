version: "3.9"

# SetupSO — Docker Compose
# Starts: PostgreSQL + Node.js API + Nginx (static frontend + reverse proxy)
#
# Usage:
#   cp .env.example .env    # fill in secrets
#   docker compose up -d
#
# Access:
#   http://localhost        → Frontend (index8.html)
#   http://localhost/api    → Backend API

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-setupso}
      POSTGRES_USER: ${POSTGRES_USER:-setupso}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Place migration SQL files in ./db/migrations/ — they run in filename order on first start
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-setupso}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Only expose the port locally for direct DB access during development.
    # Remove this block in production (keep DB internal).
    ports:
      - "127.0.0.1:5432:5432"

  # ── API (Node.js / Express) ───────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-setupso}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-setupso}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
    depends_on:
      postgres:
        condition: service_healthy
    # Do NOT expose port 3000 directly in production; Nginx handles ingress.
    # Uncomment the line below for local API testing without Nginx:
    # ports:
    #   - "127.0.0.1:3000:3000"

  # ── Nginx (static frontend + reverse proxy) ───────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro   # Place TLS certs here for HTTPS
      # Static frontend files served by Nginx
      - ./index8.html:/usr/share/nginx/html/index.html:ro
      - ./app.js:/usr/share/nginx/html/app.js:ro
    depends_on:
      - api

volumes:
  postgres_data:
    driver: local
