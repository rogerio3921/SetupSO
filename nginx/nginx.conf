# Nginx — SetupSO
# Place TLS certificate files in ./nginx/ssl/ for HTTPS:
#   nginx/ssl/setupso.crt
#   nginx/ssl/setupso.key

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain text/css application/javascript application/json;

    upstream api {
        server api:3000;
    }

    # ── HTTP → HTTPS redirect (uncomment when TLS is configured) ──────────────
    # server {
    #     listen 80;
    #     server_name _;
    #     return 301 https://$host$request_uri;
    # }

    # ── Main server block ─────────────────────────────────────────────────────
    server {
        listen 80;
        # listen 443 ssl;  # Uncomment for HTTPS
        server_name _;

        # TLS (uncomment when certificates are in place)
        # ssl_certificate     /etc/nginx/ssl/setupso.crt;
        # ssl_certificate_key /etc/nginx/ssl/setupso.key;
        # ssl_protocols       TLSv1.2 TLSv1.3;
        # ssl_ciphers         HIGH:!aNULL:!MD5;

        # ── Static frontend ───────────────────────────────────────────────────
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── API reverse proxy ─────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://api/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
