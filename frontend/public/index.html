<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1b5e75" />
    <meta name="description" content="SetupSO - Sistema de Gestão de Tempos e Movimentos em Centro Cirúrgico" />
    
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SetupSO" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- Icons -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo/icon-192.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="%PUBLIC_URL%/favicon.ico" />
    
    <!-- Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <!-- Open Graph Tags -->
    <meta property="og:title" content="SetupSO - Tempos e Movimentos" />
    <meta property="og:description" content="Sistema de Gestão de Tempos e Movimentos em Centro Cirúrgico" />
    <meta property="og:image" content="%PUBLIC_URL%/logo/icon-512.png" />
    <meta property="og:type" content="website" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SetupSO" />
    <meta name="twitter:description" content="Sistema de Gestão de Tempos e Movimentos" />
    
    <title>SetupSO - Tempos e Movimentos</title>
    
    <style>
      * {
        -webkit-tap-highlight-color: transparent;
        -webkit-user-select: none;
        user-select: none;
      }
      
      input, textarea, button {
        -webkit-user-select: text;
        user-select: text;
      }
      
      html, body, #root {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
      }
      
      body {
        background: linear-gradient(135deg, #1b5e75 0%, #16a085 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
      }
      
      .loading {
        text-align: center;
        color: white;
      }
      
      .loading h1 {
        font-size: 2.5rem;
        margin: 0 0 1rem 0;
        font-weight: 900;
      }
      
      .loading p {
        font-size: 1rem;
        opacity: 0.9;
        margin: 0;
      }
      
      .spinner {
        border: 4px solid rgba(255,255,255,0.3);
        border-radius: 50%;
        border-top: 4px solid white;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 20px auto;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading">
        <h1>SetupSO</h1>
        <p>Tempos e Movimentos</p>
        <div class="spinner"></div>
        <p>Carregando...</p>
      </div>
    </div>

    <script>
      // Register Service Worker para PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then((registration) => {
              console.log('[PWA] Service Worker registrado com sucesso');
              
              // Check for updates a cada minuto
              setInterval(() => {
                registration.update();
              }, 60000);
            })
            .catch((error) => {
              console.error('[PWA] Erro ao registrar Service Worker:', error);
            });
          
          // Listen para updates (nova versão disponível)
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            console.log('[PWA] Nova versão disponível!');
            // Aqui você pode mostrar um toast notificando sobre atualização
          });
        });
      }
      
      // Deferral da prompt de instalação
      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        console.log('[PWA] Instalação disponível');
        
        // Armazenar para mostrar botão depois se necessário
        window.installPrompt = deferredPrompt;
      });
      
      // Handler para quando app é instalado
      window.addEventListener('appinstalled', () => {
        console.log('[PWA] SetupSO instalado com sucesso!');
        deferredPrompt = null;
        window.installPrompt = null;
      });
      
      // Detectar display mode
      if (window.matchMedia('(display-mode: standalone)').matches) {
        console.log('[PWA] Rodando em modo standalone');
      }
    </script>
  </body>
</html>
