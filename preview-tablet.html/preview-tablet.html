<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Setup de Sala — Registro Rápido (Tablet) — Layout Atualizado</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }
    .btn { border-radius: 10px; font-weight: 700; }
    .btn-lg { padding-top: 1.1rem; padding-bottom: 1.1rem; font-size: 1.05rem; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800">
  <div class="max-w-lg mx-auto p-4">
    <header class="flex items-center justify-between mb-4">
      <div>
        <h1 class="text-lg font-bold">Registro Rápido — Sala B</h1>
        <div id="caseInfo" class="text-xs text-slate-500">Caso ativo: #322 — Artroplastia • Cirurgião: Dr. Silva</div>
      </div>
      <div id="clock" class="text-xs text-slate-500">--:--</div>
    </header>

    <main id="mainArea" class="bg-white p-4 rounded shadow space-y-4">
      <div class="flex items-center gap-3">
        <div id="qr" class="w-20 h-20 bg-slate-100 rounded flex items-center justify-center">
          <div class="text-xs text-slate-500">QR</div>
        </div>
        <div>
          <div id="patientName" class="text-sm font-semibold">Paciente: João S. • 45a</div>
          <div id="patientPront" class="text-xs text-slate-500">Prontuário: 12345</div>
        </div>
      </div>

      <!-- Pairs of buttons side by side -->
      <div class="space-y-3">
        <!-- Entrada/ Saída Paciente -->
        <div class="grid grid-cols-2 gap-3">
          <button id="btnEntradaPaciente" class="btn btn-lg bg-emerald-600 text-white">Entrada Paciente</button>
          <button id="btnSaidaPaciente" class="btn btn-lg bg-lime-600 text-white">Saída Paciente</button>
        </div>

        <!-- Início / Fim Anestesia -->
        <div class="grid grid-cols-2 gap-3">
          <button id="btnInicioAnest" class="btn btn-lg bg-indigo-600 text-white">Início Anestesia</button>
          <button id="btnFimAnest" class="btn btn-lg bg-indigo-800 text-white">Fim Anestesia</button>
        </div>

        <!-- Início / Fim Procedimento -->
        <div class="grid grid-cols-2 gap-3">
          <button id="btnInicioProc" class="btn btn-lg bg-rose-500 text-white">Início Procedimento</button>
          <button id="btnFimProc" class="btn btn-lg bg-slate-700 text-white">Fim Procedimento</button>
        </div>

        <!-- Entrada / Saída CME -->
        <div class="grid grid-cols-2 gap-3">
          <button id="btnEntradaCME" class="btn btn-lg bg-rose-600 text-white">Entrada CME</button>
          <button id="btnSaidaCME" class="btn btn-lg bg-rose-300 text-white" disabled>Saída CME</button>
        </div>

        <!-- Entrada / Saída Limpeza -->
        <div class="grid grid-cols-2 gap-3">
          <button id="btnEntradaLimpeza" class="btn btn-lg border text-slate-700" disabled>Entrada Limpeza</button>
          <button id="btnSaidaLimpeza" class="btn btn-lg border text-slate-700" disabled>Saída Limpeza</button>
        </div>
      </div>

      <div>
        <div class="text-xs text-slate-500 mb-2">Eventos recentes</div>
        <ul id="eventsList" class="space-y-2 text-sm"></ul>
      </div>

      <div>
        <label class="text-xs text-slate-500">Observação rápida</label>
        <textarea id="quickNote" class="w-full border rounded p-2 mt-1 text-sm" rows="2" placeholder="Ex.: necessidade de equipamento adicional"></textarea>
      </div>

      <div class="flex justify-between">
        <button id="btnEditCase" class="text-sm text-slate-600">Editar caso</button>
        <button id="btnSave" class="bg-indigo-600 text-white px-4 py-2 rounded">Salvar evento</button>
      </div>
    </main>
  </div>

  <script>
    // Local demo persistence
    const STORAGE_KEY = 'setup_sala_events_demo_v2';
    const caseId = 'caso-322';
    let events = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

    // UI refs
    const btnEntradaPaciente = document.getElementById('btnEntradaPaciente');
    const btnSaidaPaciente = document.getElementById('btnSaidaPaciente');
    const btnInicioAnest = document.getElementById('btnInicioAnest');
    const btnFimAnest = document.getElementById('btnFimAnest');
    const btnInicioProc = document.getElementById('btnInicioProc');
    const btnFimProc = document.getElementById('btnFimProc');
    const btnEntradaCME = document.getElementById('btnEntradaCME');
    const btnSaidaCME = document.getElementById('btnSaidaCME');
    const btnEntradaLimpeza = document.getElementById('btnEntradaLimpeza');
    const btnSaidaLimpeza = document.getElementById('btnSaidaLimpeza');
    const eventsList = document.getElementById('eventsList');
    const clock = document.getElementById('clock');

    function nowISO(){ return new Date().toISOString(); }
    function nowHM(){ const d=new Date(); return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }

    function pushEvent(eventType, metadata = {}){
      const ev = {
        id: crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2),
        caseId,
        timestamp: nowISO(),
        eventType,
        metadata
      };
      events.push(ev);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(events));
      renderEvents();
      updateButtonsState();
    }

    function renderEvents(){
      eventsList.innerHTML = '';
      events.slice().reverse().forEach(e=>{
        const label = prettyLabel(e.eventType, e.metadata);
        const li = document.createElement('li');
        li.className = 'flex items-center justify-between';
        li.innerHTML = `<span>${new Date(e.timestamp).toLocaleTimeString()} — ${label}</span>`;
        eventsList.appendChild(li);
      });
    }

    function prettyLabel(type, metadata){
      switch(type){
        case 'entrada_paciente': return 'Entrada Paciente';
        case 'saida_paciente': return 'Saída Paciente';
        case 'inicio_anestesia': return 'Início Anestesia';
        case 'fim_anestesia': return 'Fim Anestesia';
        case 'inicio_procedimento': return 'Início Procedimento';
        case 'fim_procedimento': return 'Fim Procedimento';
        case 'entrada_cme': return 'Entrada CME';
        case 'saida_cme': return 'Saída CME';
        case 'entrada_limpeza': return 'Entrada Limpeza';
        case 'saida_limpeza': return 'Saída Limpeza';
        default: return type;
      }
    }

    function existsEvent(type){
      return events.some(e => e.eventType === type && e.caseId === caseId);
    }

    function updateButtonsState(){
      // Cleaning entry enabled only if there is a patient exit registered
      const hasSaidaPaciente = existsEvent('saida_paciente');
      btnEntradaLimpeza.disabled = !hasSaidaPaciente;

      // Saída Limpeza enabled only if entrada_limpeza exists
      btnSaidaLimpeza.disabled = !existsEvent('entrada_limpeza');

      // Saida CME enabled only if entrada_cme exists
      btnSaidaCME.disabled = !existsEvent('entrada_cme');

      // Update clock
      clock.innerText = nowHM();
    }

    // Button handlers - paired actions
    btnEntradaPaciente.addEventListener('click', ()=> pushEvent('entrada_paciente', {}));
    btnSaidaPaciente.addEventListener('click', ()=> pushEvent('saida_paciente', {}));

    btnInicioAnest.addEventListener('click', ()=> pushEvent('inicio_anestesia', {}));
    btnFimAnest.addEventListener('click', ()=> pushEvent('fim_anestesia', {}));

    btnInicioProc.addEventListener('click', ()=> pushEvent('inicio_procedimento', {}));
    btnFimProc.addEventListener('click', ()=> pushEvent('fim_procedimento', {}));

    btnEntradaCME.addEventListener('click', ()=> pushEvent('entrada_cme', {}));
    btnSaidaCME.addEventListener('click', ()=> pushEvent('saida_cme', {}));

    btnEntradaLimpeza.addEventListener('click', ()=> pushEvent('entrada_limpeza', {}));
    btnSaidaLimpeza.addEventListener('click', ()=> pushEvent('saida_limpeza', {}));

    // Init render
    renderEvents();
    updateButtonsState();

    // keep clock updated
    setInterval(()=> { clock.innerText = nowHM(); }, 1000);
  </script>
</body>
</html>
